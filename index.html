<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Extensions</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="light">
  <div class="container">

    <div class="header">
      <div class="brand">
        <img src="assets/images/logo.svg" />
      </div>
      <button class="toggle-theme" onclick="toggleTheme()">
        <img src="assets/images/icon-moon.svg" alt=""> 
        <img src="assets/images/icon-sun.svg" alt="">
      </button>
    </div>

    <div class="title">Extensions List</div>

    <div class="filters">
      <button class="active" onclick="filter('all',this)">All</button>
      <button onclick="filter('active',this)">Active</button>
      <button onclick="filter('inactive',this)">Inactive</button>
    </div>

    <div class="grid" id="grid"></div>

  </div>

    <script src="script.js"></script>

</body>
</html>
